<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosk Menu</title>
    <style>
        /* Moving Dark Gradient Background */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(-45deg, #0f0f11, #242d38, #141416, #2c3a47);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
            overflow: hidden;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 40px;
            font-size: 3rem;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.6);
            font-weight: 600;
            letter-spacing: 1px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            width: 90%;
            max-width: 700px;
        }

        /* Liquid Glass Buttons */
        .button {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-decoration: none;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5),
                        inset 0 4px 4px 0 rgba(255, 255, 255, 0.15),
                        inset 0 -4px 12px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.1s, box-shadow 0.2s;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            overflow: hidden;
        }

        /* Glossy Highlight Reflection */
        .button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(rgba(255,255,255,0.1), rgba(255,255,255,0));
            pointer-events: none;
        }

        .button:active {
            transform: scale(0.96);
            box-shadow: 0 6px 20px rgba(0,0,0,0.6), inset 0 2px 2px rgba(255,255,255,0.05);
        }

        /* Liquid Tint Translucency */
        .mcdonalds { background: rgba(218, 41, 28, 0.22); }
        .kfc { background: rgba(163, 8, 12, 0.22); }
        .dominos { background: rgba(0, 100, 145, 0.22); }
        .other { background: rgba(255, 255, 255, 0.08); }

        /* Official Image Brand Logos */
        .logo {
            width: 75px;
            height: 75px;
            margin-bottom: 20px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
        }

        .button-text {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 2px 5px rgba(0,0,0,0.7);
        }
        
        .other .button-text {
            font-size: 1.8rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Select a Place</h1>

    <div class="grid">
        <a href="https://www.mcdonalds.com" target="_self" class="button mcdonalds">
            <img class="logo" src="https://cdn.simpleicons.org/mcdonalds/%23FFC72C" alt="McDonald's Logo">
            <span class="button-text">McDonald's</span>
        </a>

        <a href="https://www.kfc.com" target="_self" class="button kfc">
            <img class="logo" src="https://cdn.simpleicons.org/kfc/%23E4002B" alt="KFC Logo">
            <span class="button-text">KFC</span>
        </a>

        <a href="https://www.dominos.com" target="_self" class="button dominos">
            <img class="logo" src="https://cdn.simpleicons.org/dominos/%23006491" alt="Domino's Logo">
            <span class="button-text">Domino's</span>
        </a>

        <a href="https://www.google.com" target="_self" class="button other">
            <img class="logo" src="https://cdn.simpleicons.org/google/white" alt="Google Logo">
            <span class="button-text">Other Places</span>
        </a>
    </div>

</body>
</html>
